<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>17班毕业纪念 · 留言册 & 照片墙</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

  <!-- ===== 登录弹窗 ===== -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h2><i class="fas fa-graduation-cap"></i> 登录</h2>
      <form id="loginForm">
        <div class="form-group">
          <input type="text" id="loginUsername" placeholder="账号" required>
        </div>
        <div class="form-group">
          <input type="password" id="loginPassword" placeholder="密码" required>
        </div>
        <button type="submit"><i class="fas fa-sign-in-alt"></i> 登录</button>
        <div id="loginError" class="login-error"></div>
      </form>
    </div>
  </div>

  <div class="container">
    <header>
      <div class="header-top">
        <h1><i class="fas fa-graduation-cap"></i> 17班 · 毕业纪念</h1>
        <div class="header-user">
          <span id="userGreeting">未登录</span>
          <button id="logoutBtn" class="logout-btn" style="display:none;"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
      </div>
      <p class="subtitle">愿此去前程似锦，相逢依旧如故</p>
    </header>

    <!-- 标签切换 -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="book"><i class="fas fa-book"></i> 留言册</button>
      <button class="tab-btn" data-tab="photos"><i class="fas fa-images"></i> 照片墙</button>
    </div>

    <!-- ===== 留言册 ===== -->
    <div id="tab-book" class="tab-content active">
      <div class="book-wrapper">
        <div class="book" id="book">
          <div class="book-spine"></div>
          <div class="page left-page" id="leftPage">
            <div class="page-content" id="leftContent">
              <div class="page-number">封面</div>
            </div>
          </div>
          <div class="page right-page" id="rightPage">
            <div class="page-content" id="rightContent">
              <div class="page-number">封底</div>
            </div>
          </div>
          <button class="page-btn prev-btn" id="prevBtn" onclick="prevPage()">
            <i class="fas fa-chevron-left"></i>
          </button>
          <button class="page-btn next-btn" id="nextBtn" onclick="nextPage()">
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
      </div>
      <div class="page-indicator" id="pageIndicator">1 / 1</div>

      <section class="form-section">
        <h2><i class="fas fa-pencil-alt"></i> 写下你的祝福</h2>
        <form id="messageForm">
          <div class="form-group">
            <input type="text" id="authorInput" placeholder="你的名字（选填）" maxlength="20">
          </div>
          <div class="form-group">
            <textarea id="contentInput" placeholder="写下你想说的话..." rows="3" maxlength="500" required></textarea>
          </div>
          <button type="submit"><i class="fas fa-feather-alt"></i> 发送祝福</button>
        </form>
        <div id="formMessage" class="form-message"></div>
      </section>
    </div>

    <!-- ===== 照片墙 ===== -->
    <div id="tab-photos" class="tab-content">
      <div class="photo-upload-section">
        <h2><i class="fas fa-cloud-upload-alt"></i> 上传班级合照</h2>
        <form id="photoForm">
          <div class="form-group">
            <input type="text" id="photoUploader" placeholder="你的名字（选填）" maxlength="20">
          </div>
          <div class="form-group">
            <input type="file" id="photoFile" accept="image/*" required>
          </div>
          <button type="submit"><i class="fas fa-upload"></i> 上传照片</button>
        </form>
        <div id="photoMessage" class="form-message"></div>
      </div>
      <div class="photo-grid" id="photoGrid">
        <div class="loading">加载照片中...</div>
      </div>
    </div>

    <footer>
      <p>17班全体同学 · 2026年夏</p>
    </footer>
  </div>

  <script src="./script.js"></script>
</body>
</html>
