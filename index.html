<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>17班毕业纪念</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="fas fa-graduation-cap"></i> 17班 · 毕业纪念</h1>
      <p class="subtitle">愿此去前程似锦，相逢依旧如故</p>
    </header>

    <main>
      <section class="book">
        <div class="book-cover">
          <div class="book-title">留言册</div>
          <div class="book-sub">Class 17 · 2026</div>
        </div>
        <div class="book-pages" id="messageList">
          <div class="loading">加载留言中...</div>
        </div>
      </section>

      <section class="form-section">
        <h2><i class="fas fa-pencil-alt"></i> 写下你的祝福</h2>
        <form id="messageForm">
          <div class="form-group">
            <input type="text" id="authorInput" placeholder="你的名字（选填）" maxlength="20">
          </div>
          <div class="form-group">
            <textarea id="contentInput" placeholder="写下你想说的话..." rows="3" maxlength="500" required></textarea>
          </div>
          <button type="submit"><i class="fas fa-feather-alt"></i> 发送祝福</button>
        </form>
        <div id="formMessage" class="form-message"></div>
      </section>
    </main>

    <footer>
      <p>17班全体同学 · 2026年夏</p>
    </footer>
  </div>

  <script src="./script.js"></script>
</body>
</html>
